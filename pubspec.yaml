name: munasba
description: تطبيق مناسبات - إنشاء وإدارة المناسبات
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  flutter_slidable: ^3.0.1
  table_calendar: ^3.0.9
  image_picker: ^1.0.7
  flutter_staggered_animations: ^1.1.1
  animations: ^2.0.11
  lottie: ^3.0.0
  qr_flutter: ^4.1.0
  share_plus: ^7.2.1
  flutter_local_notifications: ^19.4.1
  intl: ^0.20.2
  geolocator: ^10.1.0
  path_provider: ^2.1.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  dio: ^5.4.0
  flutter_animate: ^4.5.0
  confetti: ^0.7.0
  liquid_pull_to_refresh: ^3.0.1
  flutter_speed_dial: ^7.0.0
  dotted_border: ^2.1.0
  flutter_colorpicker: ^1.0.3
  timeline_tile: ^2.0.0
  flutter_rating_bar: ^4.0.1
  photo_view: ^0.14.0
  flutter_image_compress: ^2.1.0
  device_preview: ^1.3.1
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.2
  permission_handler: ^11.1.0
  connectivity_plus: ^5.0.2
  package_info_plus: ^9.0.1
  device_info_plus: ^9.1.2
  flutter_native_splash: ^2.3.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  integration_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.3

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/icon/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
